<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 💌</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(90deg,pink,hotpink);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    text-align:center;
}

h2{
    color:rgba(0,0,0,0.8);
    margin-bottom:20px;
    font-size:clamp(1.5rem,4vw,2rem);
}

.card{
    width:100%;
    /* background:white; */
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    max-width:220px;
    height:auto;
    border-radius:10px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:linear-gradient(145deg,rgb(137,3,81),rgb(240,2,145));
    padding:10px 25px;
    font-size:15px;
    color:white;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

button a{
    text-decoration:none;
    color:white;
}

@media(max-width:480px){

    .card{
        padding:15px;
    }

    .buttons{
        flex-direction:column;
        align-items:center;
    }

    button{
        width:100%;
        max-width:200px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h2>Do you want a gift ? 🎁</h2>

    <div class="card">

        <img src="bunny.gif" alt="Gift GIF">

        <div class="buttons">
            <button><a href="yes.html">Yes</a></button>
            <button><a href="howdareyou.html">No</a></button>
        </div>

    </div>

</div>

</body>
</html>
