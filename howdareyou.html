<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Dare You</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        body {
            background-color: rgba(246, 234, 109, 0.809);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 34px;
            text-align: center;
            margin-top: 10px;
        }

        .card {
            /* border: 2px solid black; */
            border-radius: 10px;
            width: 220px;
            height: 280px;
            margin-top: 30px;
            background: url("https://media1.tenor.com/m/Ag8zeVQT3fYAAAAC/wizard-cat-cat-wizard.gif");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .card h3 {
            text-align: center;
            font-weight: bolder;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            margin-top: 15px;
            font-size: 22px;
            letter-spacing:2.5px;
        }

        button {
            border: none;
            border-radius: 20px;
            width: 180px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            background-color: rgba(239, 36, 161, 0.897);
            font-size: 15px;
            color: white;
            font-weight: bold;
            margin-top: 15px;
            margin-left: 20px;
            letter-spacing: 1.5px;
        }

        button a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .scale3d:hover {
            transform: scale3d(1.1, 1.1, 1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>How Dare You ? 😡</h2>
        <div class="card">
            <h3>How Dare you</h3>
        </div>
        <button class="scale3d"><a href="yes.html">YES YES</a></button>
    </div>
</body>

</html>
